<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpiar PWA - AetherCubix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        
        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        #log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-success {
            color: #28a745;
        }
        
        .log-error {
            color: #dc3545;
        }
        
        .log-info {
            color: #17a2b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Limpieza Completa de PWA</h1>
        
        <div class="warning">
            <strong>⚠️ Atención:</strong> Esta herramienta eliminará TODOS los Service Workers y cachés de la aplicación. Esto es necesario para solucionar problemas de carga.
        </div>
        
        <div class="success" id="success">
            <strong>✅ ¡Éxito!</strong> La limpieza se completó correctamente. <strong>La página se recargará en 3 segundos...</strong>
        </div>
        
        <div class="error" id="error">
            <strong>❌ Error:</strong> <span id="errorMsg"></span>
        </div>
        
        <button onclick="cleanAll()" id="cleanBtn">🧹 Limpiar Todo</button>
        <button onclick="goHome()">🏠 Volver al Inicio</button>
        
        <div id="log"></div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function cleanAll() {
            const btn = document.getElementById('cleanBtn');
            btn.disabled = true;
            btn.textContent = '🔄 Limpiando...';
            
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('log').innerHTML = '';
            
            try {
                log('Iniciando limpieza completa...', 'info');
                
                // 1. Desregistrar Service Workers
                log('Desregistrando Service Workers...', 'info');
                const registrations = await navigator.serviceWorker.getRegistrations();
                
                if (registrations.length === 0) {
                    log('No hay Service Workers registrados', 'info');
                } else {
                    for (const registration of registrations) {
                        await registration.unregister();
                        log(`✅ Service Worker desregistrado: ${registration.scope}`, 'success');
                    }
                }
                
                // 2. Limpiar todas las cachés
                log('Limpiando cachés...', 'info');
                const cacheNames = await caches.keys();
                
                if (cacheNames.length === 0) {
                    log('No hay cachés para limpiar', 'info');
                } else {
                    for (const cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        log(`✅ Caché eliminada: ${cacheName}`, 'success');
                    }
                }
                
                // 3. Limpiar localStorage relacionado con PWA
                log('Limpiando localStorage...', 'info');
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.includes('pwa') || key.includes('cache') || key.includes('sw'))) {
                        keysToRemove.push(key);
                    }
                }
                
                keysToRemove.forEach(key => {
                    localStorage.removeItem(key);
                    log(`✅ localStorage eliminado: ${key}`, 'success');
                });
                
                if (keysToRemove.length === 0) {
                    log('No hay datos de localStorage PWA para limpiar', 'info');
                }
                
                // 4. Limpiar sessionStorage relacionado con PWA
                log('Limpiando sessionStorage...', 'info');
                const sessionKeysToRemove = [];
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    if (key && (key.includes('pwa') || key.includes('cache') || key.includes('sw'))) {
                        sessionKeysToRemove.push(key);
                    }
                }
                
                sessionKeysToRemove.forEach(key => {
                    sessionStorage.removeItem(key);
                    log(`✅ sessionStorage eliminado: ${key}`, 'success');
                });
                
                if (sessionKeysToRemove.length === 0) {
                    log('No hay datos de sessionStorage PWA para limpiar', 'info');
                }
                
                log('✅ LIMPIEZA COMPLETADA EXITOSAMENTE', 'success');
                
                document.getElementById('success').style.display = 'block';
                
                // Recargar la página después de 3 segundos
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 3000);
                
            } catch (error) {
                log(`❌ Error durante la limpieza: ${error.message}`, 'error');
                document.getElementById('error').style.display = 'block';
                document.getElementById('errorMsg').textContent = error.message;
                btn.disabled = false;
                btn.textContent = '🧹 Intentar de Nuevo';
            }
        }
        
        function goHome() {
            window.location.href = '/index.html';
        }
        
        // Verificar estado actual al cargar
        window.addEventListener('load', async () => {
            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                const cacheNames = await caches.keys();
                
                log(`📊 Estado actual:`, 'info');
                log(`   Service Workers: ${registrations.length}`, 'info');
                log(`   Cachés: ${cacheNames.length}`, 'info');
                
                if (registrations.length > 0) {
                    registrations.forEach(reg => {
                        log(`   - SW: ${reg.scope}`, 'info');
                    });
                }
                
                if (cacheNames.length > 0) {
                    cacheNames.forEach(name => {
                        log(`   - Cache: ${name}`, 'info');
                    });
                }
            } catch (error) {
                log(`⚠️ No se pudo obtener el estado: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
